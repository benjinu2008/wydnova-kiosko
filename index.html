<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Wydnova — Promo Ing. Guillermo Villanueva</title>
<meta name="theme-color" content="#0B0E14" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
  rel="stylesheet"
/>

<!-- Tailwind por CDN (JIT en el navegador, sin paso de build) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Iconos -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  :root { color-scheme: dark; }
  html, body { background: #0B0E14; color: #E7EAF0; font-family: 'Inter', system-ui, sans-serif; }
  a { text-decoration: none; color: inherit; }
  .nums { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #222837; border-radius: 999px; }

  input[type=text], input[type=email], input[type=password] {
    background: #0B0E14; border: 1px solid #222837; border-radius: .5rem;
    padding: .55rem .75rem; font-size: .875rem; color: #E7EAF0; width: 100%;
  }
  input:focus { outline: 2px solid #22C997; outline-offset: 1px; }
  input::placeholder { color: #8A93A6; }

  .btn {
    display: inline-flex; align-items: center; gap: .5rem; justify-content: center;
    white-space: nowrap; border-radius: .5rem; font-size: .875rem; font-weight: 500;
    transition: background-color .15s, opacity .15s; height: 2.5rem; padding: 0 1rem;
    border: none; cursor: pointer;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #22C997; color: #04140F; }
  .btn-primary:hover:not(:disabled) { background: #1db886; }
  .btn-secondary { background: #12161F; border: 1px solid #222837; color: #E7EAF0; }
  .btn-secondary:hover:not(:disabled) { background: #181D29; }
  .btn-ghost { background: transparent; color: #E7EAF0; }
  .btn-ghost:hover:not(:disabled) { background: #181D29; }
  .btn-danger { background: #E5566B; color: #1A0A0D; }
  .btn-danger:hover:not(:disabled) { background: #d33f56; }
  .btn-sm { height: 2rem; padding: 0 .75rem; font-size: .75rem; }
  .btn-icon { height: 2.5rem; width: 2.5rem; padding: 0; }
</style>
</head>
<body class="antialiased">
<div id="app"></div>

<script type="module">
/* =====================================================================
   WYDNOVA — app de una sola página (vanilla JS + Firebase modular SDK)
   Pensada para subir el repo entero a GitHub y servirlo con GitHub Pages.
   No hay paso de build: todo se interpreta tal cual en el navegador.

   FASE 1 (esta entrega): login, roles, layout, dashboard, participantes/
   ranking, gestión de administradores. El resto de los módulos (jornadas,
   proyectos, finanzas, inventario, anuncios, galería, estadísticas,
   configuración, auditoría, papelera) están marcados como "próxima fase"
   en la navegación y en ARQUITECTURA.md — pedí que se continúe para
   construirlos sobre esta misma base.
   ===================================================================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut,
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, updateDoc, onSnapshot, collection, query, orderBy, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getStorage, ref as storageRef, uploadBytes, getDownloadURL,
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

/* =====================================================================
   1. CONFIGURACIÓN DE FIREBASE
   Reemplazá estos valores por los de tu proyecto:
   Firebase Console > Configuración del proyecto > Tus apps > SDK setup.
   Son valores públicos (no son secretos): la seguridad real la dan las
   reglas de Firestore/Storage, no esconder esta config.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID",
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const storage = getStorage(fbApp);

/* =====================================================================
   2. ROLES Y PERMISOS — punto único de verdad
   ===================================================================== */
const RANK = { usuario: 0, admin: 1, super_admin: 2 };

const PERMISOS = {
  VER_RANKING: 'usuario', VER_JORNADAS: 'usuario', VER_PROYECTOS: 'usuario',
  VER_FINANZAS: 'usuario', VER_GALERIA: 'usuario', VER_ANUNCIOS: 'usuario',
  VER_PERFILES: 'usuario', VER_ESTADISTICAS: 'usuario', CONFIRMAR_ASISTENCIA: 'usuario',
  GESTIONAR_JORNADAS: 'admin', ASIGNAR_PUNTOS: 'admin', GESTIONAR_PROYECTOS: 'admin',
  GESTIONAR_INGRESOS: 'admin', GESTIONAR_GASTOS: 'admin', GESTIONAR_INVENTARIO: 'admin',
  GESTIONAR_ANUNCIOS: 'admin',
  GESTIONAR_ADMINISTRADORES: 'super_admin', CONFIGURACION_GENERAL: 'super_admin',
  RESTAURAR_PAPELERA: 'super_admin', IMPORTAR_EXPORTAR: 'super_admin', GESTIONAR_PERMISOS: 'super_admin',
};

function tienePermiso(rol, permiso) {
  if (!rol) return false;
  const requerido = PERMISOS[permiso];
  if (requerido === undefined) return false;
  return RANK[rol] >= RANK[requerido];
}
function esAdmin(rol) { return rol === 'admin' || rol === 'super_admin'; }
function etiquetaRol(rol) {
  return { usuario: 'Usuario', admin: 'Administrador', super_admin: 'Super Admin' }[rol] || rol;
}

/* =====================================================================
   3. NAVEGACIÓN — agregar un módulo nuevo es agregar una línea acá
   ===================================================================== */
const NAV_ITEMS = [
  { to: '#/', label: 'Inicio', icon: 'layout-dashboard', permiso: 'VER_RANKING' },
  { to: '#/participantes', label: 'Ranking y Participantes', icon: 'trophy', permiso: 'VER_RANKING' },
  { to: '#/jornadas', label: 'Jornadas', icon: 'calendar-days', permiso: 'VER_JORNADAS' },
  { to: '#/proyectos', label: 'Proyectos', icon: 'boxes', permiso: 'VER_PROYECTOS' },
  { to: '#/finanzas', label: 'Ingresos y Gastos', icon: 'wallet', permiso: 'VER_FINANZAS' },
  { to: '#/galeria', label: 'Galería', icon: 'image', permiso: 'VER_GALERIA' },
  { to: '#/anuncios', label: 'Anuncios', icon: 'megaphone', permiso: 'VER_ANUNCIOS' },
  { to: '#/estadisticas', label: 'Estadísticas', icon: 'bar-chart-3', permiso: 'VER_ESTADISTICAS' },
];
const NAV_ADMIN_ITEMS = [
  { to: '#/admin/usuarios', label: 'Administradores', icon: 'shield-check', permiso: 'GESTIONAR_ADMINISTRADORES' },
];

/* =====================================================================
   4. UTILIDADES
   ===================================================================== */
function formatMoney(v) {
  const n = Number(v) || 0;
  return n.toLocaleString('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 });
}
function formatDate(ts) {
  if (!ts) return '';
  const d = ts?.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str = '') {
  return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function refreshIcons() { if (window.lucide) window.lucide.createIcons(); }

function avatarHtml(p, sizeClass = 'h-10 w-10') {
  const inicial = `${(p?.nombre || '').charAt(0)}${(p?.apellido || '').charAt(0)}`.toUpperCase();
  if (p?.fotoURL) {
    return `<span class="relative flex ${sizeClass} shrink-0 overflow-hidden rounded-full"><img src="${p.fotoURL}" class="h-full w-full object-cover" alt="" /></span>`;
  }
  return `<span class="relative flex ${sizeClass} shrink-0 items-center justify-center overflow-hidden rounded-full bg-[#22C997]/15 text-xs font-semibold text-[#22C997]">${inicial}</span>`;
}
function roleBadgeHtml(rol, extra = '') {
  if (!rol) return '';
  const variant = rol === 'super_admin' ? 'bg-[#E8A33D]/15 text-[#E8A33D]'
    : rol === 'admin' ? 'bg-[#22C997]/15 text-[#22C997]'
    : 'bg-[#181D29] text-[#8A93A6] border border-[#222837]';
  return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${variant} ${extra}">${etiquetaRol(rol)}</span>`;
}
function statCardHtml(label, valueHtml, icon, accent = 'default', hint = '') {
  const color = { default: 'text-[#E7EAF0]', primary: 'text-[#22C997]', warn: 'text-[#E8A33D]', danger: 'text-[#E5566B]' }[accent];
  return `
    <div class="rounded-lg border border-[#222837] bg-[#12161F]">
      <div class="flex items-start justify-between p-5">
        <div>
          <p class="text-xs font-medium text-[#8A93A6]">${label}</p>
          <p class="mt-2 nums text-2xl font-semibold ${color}">${valueHtml}</p>
          ${hint ? `<p class="mt-1 text-xs text-[#8A93A6]">${hint}</p>` : ''}
        </div>
        <div class="rounded-md bg-[#181D29] p-2 h-fit"><i data-lucide="${icon}" class="h-4 w-4 ${color}"></i></div>
      </div>
    </div>`;
}
function emptyStateHtml(icon, title, desc = '') {
  return `
    <div class="flex flex-col items-center gap-2 py-16 text-center">
      <div class="mb-2 rounded-full bg-[#181D29] p-3"><i data-lucide="${icon}" class="h-5 w-5 text-[#8A93A6]"></i></div>
      <p class="text-sm font-medium text-[#E7EAF0]">${title}</p>
      ${desc ? `<p class="max-w-sm text-sm text-[#8A93A6] mx-auto">${desc}</p>` : ''}
    </div>`;
}
function pantallaCentrada(titulo, desc) {
  return `<div class="flex h-screen flex-col items-center justify-center gap-2 px-4 text-center">
    <p class="text-base font-semibold">${titulo}</p>
    ${desc ? `<p class="text-sm text-[#8A93A6]">${desc}</p>` : ''}
  </div>`;
}
function traducirErrorAuth(code) {
  const mapa = {
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/invalid-email': 'El correo no tiene un formato válido.',
    'auth/user-disabled': 'Esta cuenta fue desactivada.',
    'auth/too-many-requests': 'Demasiados intentos. Probá de nuevo en unos minutos.',
  };
  return mapa[code] || 'No se pudo iniciar sesión. Probá de nuevo.';
}

/* =====================================================================
   5. ESTADO GLOBAL
   ===================================================================== */
let usuarioFirebase = null;
let perfilActual = null;
let unsubPerfil = null;
let routeUnsubs = [];
function limpiarRouteListeners() { routeUnsubs.forEach((u) => u()); routeUnsubs = []; }

/* =====================================================================
   6. SHELL (sidebar + topbar + contenedor de la vista activa)
   ===================================================================== */
function esRutaActiva(to, rutaActiva) {
  if (to === '#/') return rutaActiva === '#/';
  return rutaActiva === to || rutaActiva.startsWith(to + '/');
}

function renderShell(vista, rutaActiva, titulo) {
  const items = NAV_ITEMS.filter((i) => tienePermiso(perfilActual.rol, i.permiso));
  const adminItems = NAV_ADMIN_ITEMS.filter((i) => tienePermiso(perfilActual.rol, i.permiso));

  const navHtml = (lista) => lista.map((i) => `
    <a href="${i.to}" class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium transition-colors ${
      esRutaActiva(i.to, rutaActiva) ? 'bg-[#22C997]/15 text-[#22C997]' : 'text-[#8A93A6] hover:bg-[#181D29] hover:text-[#E7EAF0]'
    }">
      <i data-lucide="${i.icon}" class="h-4 w-4 shrink-0"></i> ${i.label}
    </a>`).join('');

  const sidebarInner = `
    <div class="mb-4 flex items-center gap-2 px-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-md bg-[#22C997]/15 text-[#22C997]"><i data-lucide="sparkles" class="h-4 w-4"></i></div>
      <div>
        <p class="text-sm font-semibold leading-none">Wydnova</p>
        <p class="text-[11px] text-[#8A93A6] leading-none mt-0.5">Promo Ing. G. Villanueva</p>
      </div>
    </div>
    <div class="flex flex-col gap-1">${navHtml(items)}</div>
    ${adminItems.length ? `
      <p class="mt-6 px-3 text-[11px] font-semibold uppercase tracking-wide text-[#8A93A6]">Administración</p>
      <div class="mt-1 flex flex-col gap-1">${navHtml(adminItems)}</div>
    ` : ''}
  `;

  document.getElementById('app').innerHTML = `
    <div class="flex h-screen overflow-hidden">
      <aside class="hidden w-64 shrink-0 border-r border-[#222837] bg-[#12161F]/60 p-4 lg:flex lg:flex-col">${sidebarInner}</aside>

      <div id="overlay-mobile" class="fixed inset-0 z-40 hidden">
        <div class="absolute inset-0 bg-black/60" data-action="cerrar-menu"></div>
        <aside class="absolute left-0 top-0 h-full w-72 overflow-y-auto border-r border-[#222837] bg-[#12161F] p-4">${sidebarInner}</aside>
      </div>

      <div class="flex flex-1 flex-col overflow-hidden">
        <header class="flex h-16 shrink-0 items-center justify-between border-b border-[#222837] bg-[#0B0E14]/80 px-4 backdrop-blur-sm lg:px-6">
          <div class="flex items-center gap-2">
            <button data-action="abrir-menu" class="btn btn-ghost btn-icon lg:hidden"><i data-lucide="menu" class="h-5 w-5"></i></button>
            <h1 class="text-base font-semibold lg:text-lg">${titulo}</h1>
          </div>

          <div class="relative">
            <button data-action="toggle-menu-usuario" class="flex items-center gap-2 rounded-md p-1 hover:bg-[#181D29]">
              ${avatarHtml(perfilActual, 'h-9 w-9')}
              <div class="hidden text-left sm:block">
                <p class="text-sm font-medium leading-none">${escapeHtml(perfilActual.nombre)} ${escapeHtml(perfilActual.apellido)}</p>
                ${roleBadgeHtml(perfilActual.rol, 'mt-1')}
              </div>
            </button>
            <div id="menu-usuario" class="hidden absolute right-0 z-50 mt-2 w-48 rounded-md border border-[#222837] bg-[#12161F] p-1 shadow-lg shadow-black/40">
              <a href="#/participantes/${perfilActual.id}" class="flex items-center gap-2 rounded-sm px-2 py-1.5 text-sm hover:bg-[#181D29]"><i data-lucide="user" class="h-4 w-4"></i> Mi perfil</a>
              <div class="my-1 h-px bg-[#222837]"></div>
              <button data-action="cerrar-sesion" class="flex w-full items-center gap-2 rounded-sm px-2 py-1.5 text-left text-sm text-[#E5566B] hover:bg-[#181D29]"><i data-lucide="log-out" class="h-4 w-4"></i> Cerrar sesión</button>
            </div>
          </div>
        </header>

        <main class="flex-1 overflow-y-auto scrollbar-thin p-4 lg:p-6">
          <div id="vista-content">${vista.html}</div>
        </main>
      </div>
    </div>
  `;
  refreshIcons();
  vista.mount?.();
}

/* Delegación de eventos global — se registra una sola vez */
document.addEventListener('click', (e) => {
  if (e.target.closest('a[href^="#/"]')) {
    document.getElementById('overlay-mobile')?.classList.add('hidden');
  }

  const menu = document.getElementById('menu-usuario');
  const esBotonMenu = e.target.closest('[data-action="toggle-menu-usuario"]');
  if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && !esBotonMenu) {
    menu.classList.add('hidden');
  }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if (action === 'abrir-menu') document.getElementById('overlay-mobile')?.classList.remove('hidden');
  if (action === 'cerrar-menu') document.getElementById('overlay-mobile')?.classList.add('hidden');
  if (action === 'toggle-menu-usuario') menu?.classList.toggle('hidden');
  if (action === 'cerrar-sesion') signOut(auth);
  if (action === 'volver') history.back();
  if (action === 'hacer-admin') updateDoc(doc(db, 'users', id), { rol: 'admin' });
  if (action === 'quitar-admin') updateDoc(doc(db, 'users', id), { rol: 'usuario' });
  if (action === 'activar') updateDoc(doc(db, 'users', id), { activo: true });
  if (action === 'desactivar') updateDoc(doc(db, 'users', id), { activo: false });
});

/* =====================================================================
   7. VISTAS
   ===================================================================== */
function vistaDashboard() {
  const html = `
    <div class="flex flex-col gap-6">
      <div>
        <h2 class="text-xl font-semibold">Hola, ${escapeHtml(perfilActual.nombre)} 👋</h2>
        <p class="text-sm text-[#8A93A6]">Así está el curso hoy.</p>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
        ${statCardHtml('Balance actual', formatMoney(0), 'wallet', 'primary', 'Se activa en fase 3')}
        ${statCardHtml('Total gastos', formatMoney(0), 'trending-down', 'danger', 'Se activa en fase 3')}
        ${statCardHtml('Total puntos del curso', '<span id="stat-total-puntos">—</span>', 'trophy', 'warn')}
        ${statCardHtml('Participantes', '<span id="stat-total-participantes">—</span>', 'users', 'default')}
      </div>

      <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
        <div class="lg:col-span-1 rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="p-5"><h3 class="text-sm font-medium text-[#8A93A6]">Top ranking</h3></div>
          <div id="dashboard-ranking" class="flex flex-col gap-3 p-5 pt-0"><p class="text-sm text-[#8A93A6]">Cargando…</p></div>
        </div>
        <div class="lg:col-span-2 rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="p-5"><h3 class="text-sm font-medium text-[#8A93A6]">Próximas jornadas</h3></div>
          <div class="p-5 pt-0">${emptyStateHtml('calendar-days', 'El módulo de jornadas llega en la fase 2', 'Ahí vas a poder crear jornadas, confirmar asistencia y ver los puntos que se reparten en cada una.')}</div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
        <div class="rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="p-5"><h3 class="text-sm font-medium text-[#8A93A6]">Últimos movimientos</h3></div>
          <div class="p-5 pt-0">${emptyStateHtml('wallet', 'El módulo de ingresos y gastos llega en la fase 3', 'Vas a ver cada operación (rifas, kioscos, ventas) con sus movimientos y el total acumulado.')}</div>
        </div>
        <div class="rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="p-5"><h3 class="text-sm font-medium text-[#8A93A6]">Últimos anuncios</h3></div>
          <div class="p-5 pt-0">${emptyStateHtml('megaphone', 'El módulo de anuncios llega en la fase 4', 'Los administradores van a poder publicar novedades para todo el curso.')}</div>
        </div>
      </div>
    </div>
  `;

  return { html, mount() {
    const q = query(collection(db, 'users'), orderBy('puntos', 'desc'));
    const unsub = onSnapshot(q, (snap) => {
      const usuarios = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      const totalPuntos = usuarios.reduce((acc, u) => acc + (u.puntos || 0), 0);
      const elPuntos = document.getElementById('stat-total-puntos');
      if (elPuntos) elPuntos.textContent = totalPuntos;
      const elPart = document.getElementById('stat-total-participantes');
      if (elPart) elPart.textContent = usuarios.length;

      const cont = document.getElementById('dashboard-ranking');
      if (cont) {
        const top5 = usuarios.slice(0, 5);
        cont.innerHTML = top5.length ? top5.map((u, i) => `
          <div class="flex items-center gap-3">
            <span class="w-4 text-xs font-semibold text-[#8A93A6]">${i + 1}</span>
            ${avatarHtml(u, 'h-8 w-8')}
            <span class="flex-1 truncate text-sm">${escapeHtml(u.nombre)} ${escapeHtml(u.apellido)}</span>
            <span class="nums text-sm font-semibold text-[#E8A33D]">${u.puntos || 0} pts</span>
          </div>`).join('') : '<p class="text-sm text-[#8A93A6]">Todavía no hay puntos asignados.</p>';
        refreshIcons();
      }
    });
    routeUnsubs.push(unsub);
  }};
}

function vistaParticipantesList() {
  const html = `
    <div class="flex flex-col gap-4">
      <div>
        <h2 class="text-xl font-semibold">Ranking y Participantes</h2>
        <p class="text-sm text-[#8A93A6]">Puntos acumulados por cada integrante del curso.</p>
      </div>
      <div class="relative max-w-sm">
        <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-[#8A93A6]"></i>
        <input id="busqueda-participantes" type="text" placeholder="Buscar por nombre…" class="pl-9" />
      </div>
      <div class="rounded-lg border border-[#222837] bg-[#12161F]">
        <div id="lista-participantes" class="divide-y divide-[#222837]"><p class="p-6 text-center text-sm text-[#8A93A6]">Cargando…</p></div>
      </div>
    </div>
  `;

  return { html, mount() {
    let usuarios = [];

    function pintar() {
      const termino = (document.getElementById('busqueda-participantes')?.value || '').toLowerCase();
      const filtrados = usuarios.filter((u) => `${u.nombre} ${u.apellido}`.toLowerCase().includes(termino));
      const cont = document.getElementById('lista-participantes');
      if (!cont) return;
      cont.innerHTML = filtrados.length ? filtrados.map((u) => `
        <a href="#/participantes/${u.id}" class="flex items-center gap-4 p-4 transition-colors hover:bg-[#181D29]">
          <span class="w-6 text-sm font-semibold text-[#8A93A6]">${usuarios.indexOf(u) + 1}</span>
          ${avatarHtml(u)}
          <div class="flex-1">
            <p class="text-sm font-medium">${escapeHtml(u.nombre)} ${escapeHtml(u.apellido)}</p>
            ${roleBadgeHtml(u.rol, 'mt-1')}
          </div>
          ${!u.activo ? '<span class="text-xs text-[#E5566B]">Inactivo</span>' : ''}
          <span class="nums text-sm font-semibold text-[#E8A33D]">${u.puntos || 0} pts</span>
        </a>`).join('') : '<p class="p-6 text-center text-sm text-[#8A93A6]">No se encontraron participantes.</p>';
      refreshIcons();
    }

    const q = query(collection(db, 'users'), orderBy('puntos', 'desc'));
    const unsub = onSnapshot(q, (snap) => { usuarios = snap.docs.map((d) => ({ id: d.id, ...d.data() })); pintar(); });
    routeUnsubs.push(unsub);
    document.getElementById('busqueda-participantes').addEventListener('input', pintar);
  }};
}

function vistaParticipantePerfil(id) {

  return { html, mount() {
    const refDoc = doc(db, 'users', id);
    const unsub = onSnapshot(refDoc, (snap) => {
      const cont = document.getElementById('perfil-contenido');
      if (!cont) return;

      if (!snap.exists()) {
        cont.innerHTML = `
          <button data-action="volver" class="flex items-center gap-1 text-sm text-[#8A93A6] hover:text-[#E7EAF0] w-fit"><i data-lucide="arrow-left" class="h-4 w-4"></i> Volver</button>
          ${emptyStateHtml('user-x', 'No se encontró este participante')}
        `;
        refreshIcons();
        return;
      }

      const persona = { id: snap.id, ...snap.data() };
      const puedeEditarFoto = perfilActual.id === id || esAdmin(perfilActual.rol);

      cont.innerHTML = `
        <button data-action="volver" class="flex items-center gap-1 text-sm text-[#8A93A6] hover:text-[#E7EAF0] w-fit"><i data-lucide="arrow-left" class="h-4 w-4"></i> Volver</button>

        <div class="rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="flex flex-col items-center gap-4 p-8 text-center sm:flex-row sm:text-left">
            <div class="relative">
              ${avatarHtml(persona, 'h-20 w-20 text-lg')}
              ${puedeEditarFoto ? `
                <button id="btn-cambiar-foto" class="absolute -bottom-1 -right-1 flex h-7 w-7 items-center justify-center rounded-full bg-[#22C997] text-[#04140F] shadow"><i data-lucide="camera" class="h-3.5 w-3.5"></i></button>
                <input id="input-foto" type="file" accept="image/*" hidden />
              ` : ''}
            </div>
            <div class="flex-1">
              <h2 class="text-lg font-semibold">${escapeHtml(persona.nombre)} ${escapeHtml(persona.apellido)}</h2>
              <div class="mt-1 flex flex-wrap items-center justify-center gap-2 sm:justify-start">
                ${roleBadgeHtml(persona.rol)}
                ${!persona.activo ? '<span class="text-xs text-[#E5566B]">Cuenta inactiva</span>' : ''}
              </div>
              <p class="mt-2 text-xs text-[#8A93A6]">En el curso desde ${formatDate(persona.fechaCreacion)}</p>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
          <div class="rounded-lg border border-[#222837] bg-[#12161F] p-5 flex items-center gap-3">
            <i data-lucide="trophy" class="h-4 w-4 text-[#E8A33D]"></i>
            <div><p class="text-xs text-[#8A93A6]">Puntos acumulados</p><p class="nums text-lg font-semibold">${persona.puntos || 0}</p></div>
          </div>
          <div class="rounded-lg border border-[#222837] bg-[#12161F] p-5 flex items-center gap-3">
            <i data-lucide="calendar-days" class="h-4 w-4 text-[#8A93A6]"></i>
            <div><p class="text-xs text-[#8A93A6]">Jornadas realizadas</p><p class="nums text-lg font-semibold">—</p></div>
          </div>
          <div class="rounded-lg border border-[#222837] bg-[#12161F] p-5 flex items-center gap-3">
            <i data-lucide="wallet" class="h-4 w-4 text-[#22C997]"></i>
            <div><p class="text-xs text-[#8A93A6]">Monto estimado a recibir</p><p class="nums text-lg font-semibold">—</p></div>
          </div>
        </div>

        <div class="rounded-lg border border-[#222837] bg-[#12161F]">
          <div class="p-5"><h3 class="text-sm font-medium text-[#8A93A6]">Participación por proyecto</h3></div>
          <div class="p-5 pt-0">${emptyStateHtml('boxes', 'Disponible desde la fase 2', 'Cuando se carguen jornadas y proyectos, acá vas a ver en qué participó cada persona.')}</div>
        </div>
      `;
      refreshIcons();

      document.getElementById('btn-cambiar-foto')?.addEventListener('click', () => document.getElementById('input-foto').click());
      document.getElementById('input-foto')?.addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const ruta = storageRef(storage, `usuarios/${id}/avatar.jpg`);
        await uploadBytes(ruta, file);
        const url = await getDownloadURL(ruta);
        await updateDoc(refDoc, { fotoURL: url });
      });
    });
    routeUnsubs.push(unsub);
  }};
}

function vistaAdminUsuarios() {
  const html = `
    <div class="flex flex-col gap-4">
      <div>
        <h2 class="text-xl font-semibold">Administradores</h2>
        <p class="text-sm text-[#8A93A6]">Ascendé o degradá administradores, y activá o desactivá cuentas. Sólo el super admin ve esta sección.</p>
      </div>
      <div class="rounded-lg border border-[#222837] bg-[#12161F]">
        <div id="lista-admin-usuarios" class="divide-y divide-[#222837]"><p class="p-6 text-sm text-[#8A93A6]">Cargando…</p></div>
      </div>
    </div>
  `;

  return { html, mount() {
    const q = query(collection(db, 'users'), orderBy('nombre'));
    const unsub = onSnapshot(q, (snap) => {
      const usuarios = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      const cont = document.getElementById('lista-admin-usuarios');
      if (!cont) return;

      cont.innerHTML = usuarios.map((u) => {
        const esUnoMismo = u.id === perfilActual.id;
        let botones = '';
        if (u.rol === 'usuario') botones += `<button data-action="hacer-admin" data-id="${u.id}" class="btn btn-secondary btn-sm"><i data-lucide="shield-check" class="h-3.5 w-3.5"></i> Hacer admin</button>`;
        if (u.rol === 'admin') botones += `<button data-action="quitar-admin" data-id="${u.id}" class="btn btn-secondary btn-sm"><i data-lucide="shield-off" class="h-3.5 w-3.5"></i> Quitar admin</button>`;
        if (u.rol === 'super_admin') botones += `<span class="px-2 py-1.5 text-xs text-[#8A93A6]">Super admin no se modifica acá</span>`;
        if (!esUnoMismo && u.rol !== 'super_admin') {
          botones += u.activo
            ? `<button data-action="desactivar" data-id="${u.id}" class="btn btn-secondary btn-sm"><i data-lucide="user-x" class="h-3.5 w-3.5"></i> Desactivar</button>`
            : `<button data-action="activar" data-id="${u.id}" class="btn btn-primary btn-sm"><i data-lucide="user-check" class="h-3.5 w-3.5"></i> Activar</button>`;
        }
        return `
          <div class="flex flex-wrap items-center gap-3 p-4">
            ${avatarHtml(u)}
            <div class="min-w-[160px] flex-1">
              <p class="text-sm font-medium">${escapeHtml(u.nombre)} ${escapeHtml(u.apellido)} ${esUnoMismo ? '<span class="text-xs text-[#8A93A6]">(vos)</span>' : ''}</p>
              ${roleBadgeHtml(u.rol, 'mt-1')}
            </div>
            ${!u.activo ? '<span class="text-xs text-[#E5566B]">Inactivo</span>' : ''}
            <div class="flex flex-wrap gap-2">${botones}</div>
          </div>`;
      }).join('');
      refreshIcons();
    });
    routeUnsubs.push(unsub);
  }};
}

function mostrarLogin() {
  document.getElementById('app').innerHTML = `
    <div class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-sm rounded-lg border border-[#222837] bg-[#12161F] p-8">
        <div class="mb-6 flex flex-col items-center gap-2 text-center">
          <div class="flex h-10 w-10 items-center justify-center rounded-md bg-[#22C997]/15 text-[#22C997]"><i data-lucide="sparkles" class="h-5 w-5"></i></div>
          <h1 class="text-lg font-semibold">Wydnova</h1>
          <p class="text-sm text-[#8A93A6]">Promo Ing. Guillermo Villanueva</p>
        </div>
        <form id="form-login" class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium" for="login-email">Correo</label>

          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium" for="login-password">Contraseña</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <p id="login-error" class="hidden text-sm text-[#E5566B]"></p>
          <button type="submit" id="login-submit" class="btn btn-primary mt-2">Ingresar</button>
        </form>
        <p class="mt-6 text-center text-xs text-[#8A93A6]">¿No tenés tu contraseña inicial? Pedísela a un administrador del curso.</p>
      </div>
    </div>
  `;
  refreshIcons();

  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const boton = document.getElementById('login-submit');
    const errorEl = document.getElementById('login-error');
    errorEl.classList.add('hidden');
    boton.disabled = true;
    boton.textContent = 'Ingresando…';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      errorEl.textContent = traducirErrorAuth(err.code);

function mostrarSinAcceso() {
  document.getElementById('app').innerHTML = pantallaCentrada('No tenés acceso a esta sección', 'Si pensás que es un error, hablá con un administrador.');
}
function mostrarInactivo() {
  document.getElementById('app').innerHTML = pantallaCentrada('Tu cuenta está desactivada', 'Hablá con un administrador del curso para reactivarla.');
}

/* =====================================================================
   8. RUTAS Y ROUTER (basado en el hash de la URL, ideal para GitHub Pages)
   ===================================================================== */
const RUTAS = [
  { patron: /^#\/?$/, permiso: 'VER_RANKING', titulo: 'Inicio', render: vistaDashboard },
  { patron: /^#\/participantes\/?$/, permiso: 'VER_RANKING', titulo: 'Ranking y Participantes', render: vistaParticipantesList },
  { patron: /^#\/participantes\/([^/]+)$/, permiso: 'VER_PERFILES', titulo: 'Perfil', render: (m) => vistaParticipantePerfil(m[1]) },
  { patron: /^#\/jornadas\/?$/, permiso: 'VER_JORNADAS', titulo: 'Jornadas', render: () => vistaProximaFase({ icono: 'calendar-days', titulo: 'Jornadas', descripcion: 'Construcción, ventas, limpieza, decoración y más.', fase: 2 }) },
  { patron: /^#\/proyectos\/?$/, permiso: 'VER_PROYECTOS', titulo: 'Proyectos', render: () => vistaProximaFase({ icono: 'boxes', titulo: 'Proyectos', descripcion: 'Kioscos, rifas, ventas de pizza y eventos del curso.', fase: 2 }) },
  { patron: /^#\/finanzas\/?$/, permiso: 'VER_FINANZAS', titulo: 'Ingresos y Gastos', render: () => vistaProximaFase({ icono: 'wallet', titulo: 'Ingresos y Gastos', descripcion: 'Operaciones de ingreso y gasto, con movimientos y totales automáticos.', fase: 3 }) },
  { patron: /^#\/galeria\/?$/, permiso: 'VER_GALERIA', titulo: 'Galería', render: () => vistaProximaFase({ icono: 'image', titulo: 'Galería', descripcion: 'Fotos organizadas por proyecto y por jornada.', fase: 4 }) },
  { patron: /^#\/anuncios\/?$/, permiso: 'VER_ANUNCIOS', titulo: 'Anuncios', render: () => vistaProximaFase({ icono: 'megaphone', titulo: 'Anuncios', descripcion: 'Novedades publicadas por los administradores.', fase: 4 }) },
  { patron: /^#\/estadisticas\/?$/, permiso: 'VER_ESTADISTICAS', titulo: 'Estadísticas', render: () => vistaProximaFase({ icono: 'bar-chart-3', titulo: 'Estadísticas', descripcion: 'Evolución de puntos, participación y balance del curso.', fase: 5 }) },
  { patron: /^#\/admin\/usuarios\/?$/, permiso: 'GESTIONAR_ADMINISTRADORES', titulo: 'Administradores', render: vistaAdminUsuarios },
];

function router() {
  limpiarRouteListeners();

  if (!usuarioFirebase) { mostrarLogin(); return; }
  if (!perfilActual) { document.getElementById('app').innerHTML = pantallaCentrada('Cargando…'); return; }
  if (perfilActual.activo === false) { mostrarInactivo(); return; }

  const hash = location.hash || '#/';
  for (const r of RUTAS) {
    const m = hash.match(r.patron);
    if (m) {
      if (!tienePermiso(perfilActual.rol, r.permiso)) { mostrarSinAcceso(); return; }
      renderShell(r.render(m), hash, r.titulo);
      return;
    }
  }
  renderShell(vista404(), hash, 'No encontrado');
}
window.addEventListener('hashchange', router);

/* =====================================================================
   9. CONEXIÓN CON FIREBASE AUTH
   ===================================================================== */
onAuthStateChanged(auth, (user) => {
  usuarioFirebase = user;
  if (unsubPerfil) { unsubPerfil(); unsubPerfil = null; }
  perfilActual = null;

  if (!user) { router(); return; }

  const refDoc = doc(db, 'users', user.uid);
  unsubPerfil = onSnapshot(refDoc, (snap) => {
    perfilActual = snap.exists() ? { id: snap.id, ...snap.data() } : null;
    router();
  });
  updateDoc(refDoc, { ultimoAcceso: serverTimestamp() }).catch(() => {});
});
</script>
